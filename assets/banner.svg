<svg width="1400" height="320" viewBox="0 0 1400 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Influencer Performance Dashboard — HTML5 semántico y Tailwind CSS v4">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="320" fill="url(#bg)"/>

  <!-- patrón de rejilla sutil de fondo -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <path d="M0 80 H1400 M0 160 H1400 M0 240 H1400"/>
    <path d="M280 0 V320 M560 0 V320 M840 0 V320 M1120 0 V320"/>
  </g>

  <!-- mini gráfico de barras decorativo (evoca los "drivers" del dashboard) -->
  <g transform="translate(1060,150)">
    <rect x="0"  y="70" width="34" height="80"  rx="6" fill="url(#bar1)"/>
    <rect x="48" y="40" width="34" height="110" rx="6" fill="url(#bar2)"/>
    <rect x="96" y="95" width="34" height="55"  rx="6" fill="url(#bar3)"/>
    <rect x="144" y="20" width="34" height="130" rx="6" fill="url(#bar1)" opacity="0.85"/>
    <rect x="192" y="60" width="34" height="90"  rx="6" fill="url(#bar2)" opacity="0.85"/>
  </g>

  <!-- badge KPI decorativo -->
  <g transform="translate(1060,60)">
    <rect width="236" height="56" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="18" y="24" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="1.5" fill="#a5b4fc" font-weight="700">COMISIONES (15%)</text>
    <text x="18" y="46" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#ffffff" font-weight="700">3.750,00 €</text>
    <text x="150" y="46" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#34d399" font-weight="700">↑ 12.4%</text>
  </g>

  <!-- Título principal -->
  <text x="80" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="52" fill="#ffffff" font-weight="700">Influencer Performance</text>
  <text x="80" y="185" font-family="Georgia, 'Times New Roman', serif" font-size="52" fill="#ffffff" font-weight="700">Dashboard</text>

  <text x="82" y="222" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#cbd5e1">Consolidado de campañas, conversiones y comisiones · Instagram · TikTok · YouTube</text>

  <!-- badges de stack -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">
    <rect x="82" y="250" width="118" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="100" y="271" fill="#e2e8f0">HTML5 Semántico</text>

    <rect x="212" y="250" width="150" height="32" rx="16" fill="#4f46e5" fill-opacity="0.25" stroke="#818cf8" stroke-opacity="0.5"/>
    <text x="230" y="271" fill="#c7d2fe">Tailwind CSS v4</text>

    <rect x="374" y="250" width="112" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="392" y="271" fill="#e2e8f0">Cero JS / A11y</text>
  </g>
</svg>
